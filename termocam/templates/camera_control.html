


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pi Camera Control</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 16px #0001; padding: 30px; }
        .video-feed { width: 100%; border-radius: 8px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; background: #667eea; color: #fff; font-size: 1.1em; cursor: pointer; margin: 10px 5px; }
        .btn:active { background: #5a6fd8; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-autofocus { background: #28a745; }
        .btn-autofocus:hover { background: #218838; }
        .btn-capture { background: #dc3545; }
        .btn-capture:hover { background: #c82333; }
        .controls { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .preview { margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 Pi Camera Live Stream</h2>
        <img src="http://192.168.1.153:5000/video_feed" class="video-feed" alt="Live Stream">
        <div class="controls">
            <button id="autofocusBtn" class="btn btn-autofocus" onclick="triggerAutofocus()">🎯 Autofocus</button>
            <button id="captureBtn" class="btn btn-capture" onclick="capturePhoto()">📸 Capture Photo</button>
        </div>
        <div class="preview">
            <h3>Last Captured Photo:</h3>
            <img id="photo" src="" style="width:100%;border-radius:8px;" alt="Captured Photo">
        </div>
    </div>
    <script>
        function triggerAutofocus() {
            const btn = document.getElementById('autofocusBtn');
            btn.disabled = true;
            btn.textContent = '🎯 Focusing...';
            
            fetch('http://192.168.1.153:5000/autofocus', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        btn.textContent = '✅ Focused!';
                        setTimeout(() => {
                            btn.textContent = '🎯 Autofocus';
                            btn.disabled = false;
                        }, 1500);
                    } else {
                        btn.textContent = '❌ Failed';
                        setTimeout(() => {
                            btn.textContent = '🎯 Autofocus';
                            btn.disabled = false;
                        }, 2000);
                        console.error('Autofocus Error:', data.message);
                    }
                })
                .catch(error => {
                    btn.textContent = '❌ Error';
                    setTimeout(() => {
                        btn.textContent = '🎯 Autofocus';
                        btn.disabled = false;
                    }, 2000);
                    console.error('Connection Error:', error.message);
                });
        }

        function capturePhoto() {
            const btn = document.getElementById('captureBtn');
            btn.disabled = true;
            btn.textContent = '📸 Capturing...';
            
            // Show simple progress
            let dots = 0;
            const progressInterval = setInterval(() => {
                dots = (dots + 1) % 4;
                btn.textContent = '📸 Capturing' + '.'.repeat(dots);
            }, 500);
            
            fetch('http://192.168.1.153:5000/capture_photo', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
                .then(response => response.json())
                .then(data => {
                    clearInterval(progressInterval);
                    if (data.status === 'success') {
                        btn.textContent = '✅ Captured!';
                        setTimeout(() => {
                            document.getElementById('photo').src = 'http://192.168.1.153:5000/latest_photo?' + new Date().getTime();
                            btn.textContent = '📸 Capture Photo';
                            btn.disabled = false;
                        }, 2000);
                    } else {
                        btn.textContent = '❌ Failed';
                        setTimeout(() => {
                            btn.textContent = '📸 Capture Photo';
                            btn.disabled = false;
                        }, 3000);
                        console.error('Capture Error:', data.message);
                    }
                })
                .catch(error => {
                    clearInterval(progressInterval);
                    btn.textContent = '❌ Connection Error';
                    setTimeout(() => {
                        btn.textContent = '📸 Capture Photo';
                        btn.disabled = false;
                    }, 3000);
                    console.error('Connection Error:', error.message);
                });
        }
    </script>
</body>
</html>
